<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration</title>
  </head>
  <body>
    <h3>Registration Form</h3>
    <form>
      <label for="name"><b>Name:</b></label>
      <input type="text" placeholder="Your Name" />
      <br />
      <br />
      <label for="eamil"><b>Email:</b></label>
      <input type="email" placeholder="Your Email" />
      <br />
      <br />
      <label for="password"><b>Password:</b></label>
      <input type="password" placeholder="Your password" />
      <br />
      <br />
      <label for="gender"><b>Gender:</b></label>
      <select name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
      <br />
      <br />
      <label for="hobbies"><b>Hobbies:</b></label>
      <input type="radio" name="hobbies" />
      <label for="reding" value="hobbies">Reading</label>

      <input type="radio" name="hobbies" />
      <label for="dancing" value="hobbies">Dancing</label>

      <input type="radio" name="hobbies" />
      <label for="singing" value="hobbies">Singing</label>
      <br />
      <br />

      <label for="Color">Favourit Color:</label>
      <input type="checkbox" name="color" value="red" />
      <label for="color" value="red">Red</label>

      <input type="checkbox" name="color" value="blue" />
      <label for="color" value="blue">Blue</label>

      <input type="checkbox" name="color" value="green" />
      <label for="color" value="green">Green</label>
      <br />
      <br />
      <input type="submit" value="Registration" />
    </form>
  </body>
</html>
